name: Verify
on:
  pull_request:
  workflow_call:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Security audit is temporarily disabled: `pnpm audit` hits the retired
      # npm `/-/npm/v1/security/audits` endpoint (HTTP 410) on pnpm <=10.33.0
      # and is only fixed in the pnpm 11.x line (currently 11.0.0-rc.0). Using
      # `npm audit` here would require generating a package-lock.json from the
      # pnpm-lock.yaml, which re-resolves the tree and drifts from what we
      # actually ship. Dependabot is enabled on this repo and covers the same
      # advisory surface, so we rely on it until pnpm 11 is stable.
      # Tracking: https://github.com/pnpm/pnpm/issues/9014
      - name: Security audit
        run: echo "Skipped — see comment above. Dependabot is the source of truth."

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm biome check

      - name: Build
        run: pnpm build

      - name: Check unused exports
        run: pnpm check:unused

  types:
    name: Types (TS ${{ matrix.typescript-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        typescript-version: ['5.7', '5.8', '5.9']
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install TypeScript ${{ matrix.typescript-version }}
        run: pnpm add -D typescript@${{ matrix.typescript-version }}

      - name: Type check
        run: pnpm tsc --noEmit

  size:
    name: Size
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check bundle size
        run: pnpm size
